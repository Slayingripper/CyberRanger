name: "Smart Home PV (SL1-2) - 3 VMs"
description: "Kali attacker VM + game-server VM running the Smart Home PV docker-compose lab + Security Onion monitor VM."

scenario:
  name: "Smart Home PV (SL1-2) - 3 VMs"
  team: "red"
  objective: "Kali attacker VM + game-server VM running the lab + Security Onion monitor VM."
  difficulty: "hard"
  sources:
    # Auto-download Ubuntu base image if missing
    ubuntu-20.04:
      url: "https://cloud-images.ubuntu.com/focal/current/focal-server-cloudimg-amd64.img"
      filename: "focal-server-cloudimg-amd64.img"
      sha256: "18f2977d77dfea1b74aee14533bd21c34f789139e949c57023b7364894b7e5e9"

    # Kali QEMU image is distributed as a .7z; backend will download + extract to qcow2.
    kali-linux:
      url: "https://cdimage.kali.org/current/kali-linux-2026.1-qemu-amd64.7z"
      filename: "kali-linux-2026.1-qemu-amd64.7z"
      archive_sha256: "efce2da10c775da5f58954166f633d5da9115e29663731dcb65d616f19d966f4"
      extract:
        type: "7z"
        output_filename: "kali-linux-2026.1-qemu-amd64.qcow2"
        member_glob: "*.qcow2"

    # Security Onion ISO (downloaded once, cached)
    securityonion.iso:
      url: "https://download.securityonion.net/file/securityonion/securityonion-2.4.200-20251216.iso"
      filename: "securityonion.iso"
      # Sanity threshold to avoid using a partial/HTML download.
      # (Real ISO is multi-GB.)
      min_bytes: 1000000000

    # Note: If you already have these files in ./images, the system will not re-download them.

nodes:
  - id: "attacker"
    label: "Attacker (Kali VM)"
    config:
      image: "kali-linux"
      cpu: 2
      ram: 4096
      assets: []

  - id: "game"
    label: "game-server (Ubuntu)"
    config:
      image: "ubuntu-20.04"
      cpu: 4
      ram: 8192
      assets:
        - type: package
          value: git
        - type: package
          value: docker.io
        - type: package
          value: docker-compose
        - type: command
          value: systemctl enable --now docker
        - type: command
          value: mkdir -p /opt && chown user:user /opt
        - type: command
          value: cd /opt && (test -d sl1-2 || git clone --depth 1 https://github.com/Slayingripper/SL1-2.git sl1-2)
        - type: command
          value: docker network inspect playground-net >/dev/null 2>&1 || docker network create --subnet 172.20.0.0/24 playground-net
        - type: command
          value: cd /opt/sl1-2/provisioning/files/smart-home-pv && (docker compose up -d --build || docker-compose up -d --build)

  - id: "monitor"
    label: "Monitor (Security Onion)"
    config:
      image: "securityonion.iso"
      cpu: 4
      # Security Onion is resource heavy; give it enough RAM to boot reliably.
      ram: 16384
      assets: []
      automation:
        steps:
          - type: wait
            delay_seconds: 60
          - type: send_text
            text: "yes\n"
            retries: 3
            retry_delay_seconds: 15
          - type: send_key
            key: enter

edges:
  - id: "e-attacker-game"
    source: "attacker"
    target: "game"
  - id: "e-monitor-game"
    source: "monitor"
    target: "game"
